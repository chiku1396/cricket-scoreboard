<!DOCTYPE html>
<html>
<head>
  <title>Cricket Scoreboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏏 Daily Run Scoreboard</h1>

<!-- 🏆 WINNER TOP -->
<div id="winnerBanner">🏆 Winner: Not declared yet</div>

<!-- 🏆 AWARD FEED (NEW) -->
<div id="awardFeed" style="background:#1e293b; padding:10px; margin:10px auto; width:85%; border-radius:10px;"></div>

<!-- 📅 TOP BAR -->
<div style="display:flex;justify-content:space-between; padding:10px;">
  <p id="date"></p>
  <button id="adminBtn" onclick="toggleLogin()">Admin</button>
</div>

<!-- 🔑 LOGIN -->
<div id="loginPopup">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- 🚪 LOGOUT -->
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Player</th>
      <th>Runs</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<h2>🏆 Awards</h2>

<div class="awards" id="awardsBox" style="display:none;">

  <div class="award-row">
    <label>🏏 Batsman of the Day</label>
    <select id="batsman"></select>
    <button onclick="giveSingleAward('batsman',1)">+1</button>
    <button onclick="giveSingleAward('batsman',2)">+2</button>
  </div>

  <div class="award-row">
    <label>🎯 Bowler of the Day</label>
    <select id="bowler"></select>
    <button onclick="giveSingleAward('bowler',1)">+1</button>
    <button onclick="giveSingleAward('bowler',2)">+2</button>
  </div>

  <div class="award-row">
    <label>🧤 Catch of the Day</label>
    <select id="catch"></select>
    <button onclick="giveSingleAward('catch',1)">+1</button>
    <button onclick="giveSingleAward('catch',2)">+2</button>
  </div>

  <!-- 🏆 RESET BUTTON -->
  <div class="award-row">
    <button id="resetAwardsBtn" onclick="resetAwards()" style="display:none; background:red; color:white;">
      Reset Awards
    </button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
